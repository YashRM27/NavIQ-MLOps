version: '3.8'

services:

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE

  app:
    build: .
    ports:
      - "8502:8501"
    env_file:
      - .env
    depends_on:
      - chromadb
    volumes:
      - ./data:/app/data

volumes:
  chroma_data: