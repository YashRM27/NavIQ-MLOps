apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: chromadb
spec:
  selector:
    matchLabels:
      app: chromadb
  serviceName: "chromadb-service"
  replicas: 1
  template:
    metadata:
      labels:
        app: chromadb
    spec:
      containers:
        - name: chromadb
          image: chromadb/chroma:latest
          ports:
            - containerPort: 8000
          env:
            - name: IS_PERSISTENT
              value: "TRUE"
          volumeMounts:
            - name: chroma-storage
              mountPath: /chroma/chroma
      volumes:
        - name: chroma-storage
          persistentVolumeClaim:
            claimName: chromadb-pvc